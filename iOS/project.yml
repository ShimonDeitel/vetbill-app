name: Vetbill
options:
  bundleIdPrefix: com.shimondeitel.vetcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vetbill:
    type: application
    platform: iOS
    sources:
      - path: Vetbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vetbill/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VetbillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VetbillTests
      - path: Vetbill.storekit
    dependencies:
      - target: Vetbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VetbillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VetbillUITests
    dependencies:
      - target: Vetbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vetbill:
    build:
      targets:
        Vetbill: all
        VetbillTests: [test]
        VetbillUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vetbill.storekit
    test:
      config: Debug
      storeKitConfiguration: Vetbill.storekit
      targets:
        - VetbillTests
        - VetbillUITests
    archive:
      config: Release
